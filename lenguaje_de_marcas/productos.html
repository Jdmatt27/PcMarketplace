<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PcMarketPlace | Productos</title>
    <link rel="stylesheet" href="./assets/css/main.css">
</head>

<body>

    <div class="app">
        <aside class="sidebar">
            <div class="sidebar__brand">
                <span class="sidebar__logo">P</span>
                <div>
                    <h1 class="sidebar__title">PcMarketPlace</h1>
                    <p class="sidebar__subtitle">Gestión comercial</p>
                </div>
            </div>

            <nav class="sidebar__nav">
                <a href="index.html" class="sidebar__link">Panel de control</a>
                <a href="clientes.html" class="sidebar__link">Clientes</a>
                <a href="productos.html" class="sidebar__link sidebar__link--active">Productos</a>
                <a href="ventas.html" class="sidebar__link">Ventas</a>
                <a href="usuarios.html" class="sidebar__link">Equipo comercial</a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <div>
                    <p class="topbar__eyebrow">Catálogo comercial</p>
                    <h2 class="topbar__title">Productos</h2>
                </div>
            </header>

            <section class="management">
                <article class="panel">
                    <div class="panel__header">
                        <div>
                            <h3 class="panel__title">Nuevo producto</h3>
                            <p class="panel__description">Añade o actualiza productos del catálogo.</p>
                        </div>
                    </div>

                    <form class="form" id="productForm">
                        <input type="hidden" id="productoId">

                        <div class="form__group">
                            <label class="form__label" for="nombre">Nombre</label>
                            <input class="form__input" type="text" id="nombre" required>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="categoria">Categoría</label>
                            <select class="form__select" id="categoria" required>
                                <option value="">Selecciona una categoría</option>
                                <option value="Portátiles">Portátiles</option>
                                <option value="Monitores">Monitores</option>
                                <option value="Periféricos">Periféricos</option>
                                <option value="Componentes">Componentes</option>
                                <option value="Accesorios">Accesorios</option>
                            </select>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="precio">Precio</label>
                            <input class="form__input" type="number" id="precio" min="0" step="0.01" required>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="stock">Stock</label>
                            <input class="form__input" type="number" id="stock" min="0" required>
                        </div>

                        <div class="form__actions">
                            <button class="button button--primary" type="submit" id="submitButton">
                                Guardar producto
                            </button>

                            <button class="button button--secondary" type="button" id="resetButton">
                                Limpiar
                            </button>
                        </div>
                    </form>
                </article>

                <article class="panel">
                    <div class="panel__header">
                        <div>
                            <h3 class="panel__title">Listado de productos</h3>
                            <p class="panel__description">Consulta, edita o elimina productos del catálogo.</p>
                        </div>
                    </div>

                    <div class="toolbar">
                        <input class="toolbar__search" type="search" id="searchProduct"
                            placeholder="Buscar producto...">
                    </div>

                    <div class="table table--products" id="productsTable"></div>
                </article>
            </section>
        </main>
    </div>

    <script src="./assets/js/models.js"></script>
    <script src="./assets/js/storage.js"></script>
    <script src="./assets/js/productos.js"></script>
</body>

</html>
